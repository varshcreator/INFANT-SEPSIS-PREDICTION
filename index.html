<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Sepsis AI | Early Detection</title>
</head>
<body>
    <div class="split-screen">
        <div class="left-panel">
            <h1 class="fade-in">Sepsis AI</h1>
            <p id="quote-text" class="quote-box fade-in">"Early detection of Sepsis is not just medical progress; it is a second chance at life."</p>
            <button class="btn-primary" style="width: 250px;" onclick="speakQuote()">🔊 Listen to Advice</button>
        </div>

        <div class="right-panel">
            <div class="glass-card fade-in" style="text-align: center;">
                <h2 style="margin-bottom: 20px;">Patient Registration</h2>
                <p style="color: #888; margin-bottom: 30px;">Enter the receiver's details for emergency alerts.</p>
                
                <form action="/" method="POST">
                    <div class="input-group" style="text-align: left; margin-bottom: 20px;">
                        <label style="color: #ff7eb3; font-size: 0.8rem; text-transform: uppercase;">Patient Name</label>
                        <input type="text" name="user_name" placeholder="Full Name" required 
                               style="width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;">
                    </div>

                    <div class="input-group" style="text-align: left; margin-bottom: 25px;">
                        <label style="color: #ff7eb3; font-size: 0.8rem; text-transform: uppercase;">Receiver Email ID</label>
                        <input type="email" name="receiver_email" placeholder="example@mail.com" required 
                               style="width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;">
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%;">Proceed to Analysis</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
